<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Auth — Ruben Moderno</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 500px; margin: 80px auto; padding: 0 20px; color: #222; text-align: center; }
        .code { background: #f4f4f4; padding: 12px 20px; border-radius: 8px; font-family: monospace; font-size: 1.1em; word-break: break-all; margin: 20px 0; }
        .success { color: #16a34a; font-size: 1.4em; }
    </style>
    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const error = params.get('error');
            const el = document.getElementById('result');
            if (code) {
                el.innerHTML = '<p class="success">✅ Autorização concedida!</p><p>Código de autorização:</p><div class="code">' + code + '</div><p>Copia este código e envia ao Nebur.</p>';
            } else if (error) {
                el.innerHTML = '<p style="color:#dc2626;font-size:1.4em;">❌ Erro: ' + error + '</p><p>' + (params.get('error_description') || '') + '</p>';
            } else {
                el.innerHTML = '<p>A aguardar autorização do TikTok...</p>';
            }
        };
    </script>
</head>
<body>
    <h1>TikTok Authorization</h1>
    <div id="result"><p>A processar...</p></div>
</body>
</html>
