<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Integration — Ruben Moderno</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 480px;
            padding: 2rem;
        }
        .logo {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #25f4ee, #fe2c55);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #888;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .btn-tiktok {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 36px;
            background: #fe2c55;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 24px rgba(254, 44, 85, 0.35);
        }
        .btn-tiktok:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 32px rgba(254, 44, 85, 0.5);
        }
        .btn-tiktok svg { width: 24px; height: 24px; fill: #fff; }
        .scopes {
            margin-top: 2.5rem;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .scope-tag {
            background: #1a1a2e;
            border: 1px solid #25f4ee33;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #25f4ee;
        }
        .footer {
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #555;
        }
        .footer a { color: #888; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎬</div>
        <h1>TikTok Integration</h1>
        <p>Connect your TikTok account to enable automated video publishing via the Content Posting API.</p>

        <a id="loginBtn" class="btn-tiktok" href="#">
            <svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1v-3.5a6.37 6.37 0 0 0-.79-.05A6.34 6.34 0 0 0 3.15 15a6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.34-6.34V8.52a8.26 8.26 0 0 0 4.76 1.5v-3.4a4.82 4.82 0 0 1-1-.07z"/></svg>
            Login with TikTok
        </a>

        <div class="scopes">
            <span class="scope-tag">user.info.basic</span>
            <span class="scope-tag">video.upload</span>
            <span class="scope-tag">video.publish</span>
        </div>

        <div class="footer">
            <a href="privacy.html">Privacy Policy</a> · <a href="terms.html">Terms of Service</a>
        </div>
    </div>

    <script>
        const CLIENT_KEY = 'awlu8345tex36dyt';
        const REDIRECT_URI = 'https://creator-ruben.github.io/rubenmoderno-legal/callback.html';
        const SCOPES = 'user.info.basic,video.upload,video.publish';

        function generateCSRF() {
            const arr = new Uint8Array(16);
            crypto.getRandomValues(arr);
            return Array.from(arr, b => b.toString(16).padStart(2, '0')).join('');
        }

        document.getElementById('loginBtn').addEventListener('click', function(e) {
            e.preventDefault();
            const csrfState = generateCSRF();
            sessionStorage.setItem('tiktok_csrf', csrfState);

            const url = 'https://www.tiktok.com/v2/auth/authorize/'
                + '?client_key=' + CLIENT_KEY
                + '&scope=' + SCOPES
                + '&response_type=code'
                + '&redirect_uri=' + encodeURIComponent(REDIRECT_URI)
                + '&state=' + csrfState;

            window.location.href = url;
        });
    </script>
</body>
</html>
